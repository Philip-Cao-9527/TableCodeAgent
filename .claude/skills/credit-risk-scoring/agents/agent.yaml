name: credit-risk-scoring
display_name: 信贷风控样本处理
short_description: 审核和实现信贷风控产品 workflow、测试 oracle 与 no-helper benchmark 边界，不暴露 helper。
default_prompt: >
  请按 TableCodeAgent 信贷风控样本处理规范执行：先检查贷前/贷后字段隔离、
  时间窗与标签窗口、重复申请、客户唯一性、缺失/异常/字段类型，再输出风险分层、
  业务规则校验、warnings 和 validation。真实 LLM Agent benchmark 必须采用 no-helper
  口径，不得公开 workflow helper 或 expected.json。
requires_real_api: false
evidence_fields:
  - benchmark_profile
  - helper_hints_exposed
  - schema_check.errors
  - generated_code_path
  - answer_path
  - run_python.exit_code
  - pytest_exit_code
  - failure_type
boundaries:
  - 已接入能力、工业目标和未验证能力必须分开表述
  - 未验证真实授信审批、线上模型训练评估、监管报送或生产监控
  - 不公开 expected answer、项目 oracle helper 或 solve.py 解题入口
